apiVersion: apps/v1
kind: Deployment
metadata: { name: auth, namespace: escoutly }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: registry.escoutly.com/auth:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - secretRef: { name: escoutly-secrets }
            - configMapRef: { name: escoutly-config }
          readinessProbe: { httpGet: { path: /ready, port: 8080 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10 }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: auth, namespace: escoutly }
spec:
  selector: { app: auth }
  ports: [{ port: 80, targetPort: 8080 }]
---
