# Copy to secrets.yaml and fill real values (never commit secrets.yaml).
# Or create via: kubectl -n escoutly create secret generic escoutly-secrets --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: escoutly-secrets
  namespace: escoutly
type: Opaque
stringData:
  AUTH_SECRET: "change-me"
  DATABASE_URL: "postgresql://escoutly:change-me@postgres:5432/escoutly"
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  BIZUM_WEBHOOK_SECRET: ""
  SMTP_HOST: "mailer"
  SMTP_PORT: "587"
  EMAIL_FROM: "Escoutly <noreply@escoutly.com>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: escoutly-config
  namespace: escoutly
data:
  # Internal service URLs (cluster DNS) used by callService().
  AUTH_URL_INTERNAL: "http://auth"
  LISTINGS_URL_INTERNAL: "http://listings"
  BILLING_URL_INTERNAL: "http://billing"
  ENGAGEMENT_URL_INTERNAL: "http://engagement"
  NOTIFICATIONS_URL_INTERNAL: "http://notifications"
  NODE_ENV: "production"
