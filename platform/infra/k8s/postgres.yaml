# Single Postgres with one schema per service to start (split into per-service
# databases once boundaries are stable). For production prefer a managed DB.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: escoutly
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: escoutly }
            - { name: POSTGRES_DB, value: escoutly }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: escoutly-secrets, key: AUTH_SECRET } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: escoutly
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
