# API gateway via the cluster Ingress (nginx). api.escoutly.com/v1/<svc>/* → service.
# Web hosts (apex/login/central) and ai.* keep pointing at the existing Next apps
# until the `web` extraction phase; add their rules here when those move into k8s.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: escoutly-gateway
  namespace: escoutly
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.escoutly.com]
      secretName: api-escoutly-tls
  rules:
    - host: api.escoutly.com
      http:
        paths:
          - { path: "/v1/auth(/|$)(.*)",          pathType: ImplementationSpecific, backend: { service: { name: auth,          port: { number: 80 } } } }
          - { path: "/v1/listings(/|$)(.*)",      pathType: ImplementationSpecific, backend: { service: { name: listings,      port: { number: 80 } } } }
          - { path: "/v1/billing(/|$)(.*)",       pathType: ImplementationSpecific, backend: { service: { name: billing,       port: { number: 80 } } } }
          - { path: "/v1/engagement(/|$)(.*)",    pathType: ImplementationSpecific, backend: { service: { name: engagement,    port: { number: 80 } } } }
          # notifications is internal-only: intentionally NOT exposed on the public ingress.
