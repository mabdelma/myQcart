# ─── QCart VPS overlay — shared-Caddy, multi-app VPS ─────────────────────────
# QCart shares one Linux VPS with qarrito and escoutly. qarrito's stack owns the
# single Caddy reverse proxy (ports 80/443, automatic Let's Encrypt). Every other
# app — including QCart — joins the shared external `edge` Docker network and is
# reached by Caddy through its container name. No app but Caddy publishes :80/:443.
#
# Layered on top of the base docker-compose.yml:
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.vps.yml up -d --build
#
# Prereqs on the VPS (one-time):
#   docker network create edge        # if qarrito/escoutly haven't already
#   cp .env.prod.example .env.prod     # then fill in real secrets
#
# DNS: one A record  →  qcart.gmtmall.com → VPS public IP
# Then add the QCart block to qarrito's Caddyfile (see DEPLOYMENT.md) and reload:
#   docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile
# ─────────────────────────────────────────────────────────────────────────────
name: qcart-prod

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-qcart}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}"
      POSTGRES_DB: "${POSTGRES_DB:-qcart}"
    # !reset replaces the base port list instead of merging — without it the
    # base file's "5434:5432" leaks through and exposes Postgres to the internet.
    ports: !reset []
    networks: [default]

  redis:
    image: redis:7-alpine
    restart: always
    networks: [default]

  migrate:
    image: ghcr.io/anomalyco/qcart/api:latest
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-qcart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qcart}"
      # Seed creates the platform super_admin (idempotent) with these on first run.
      SUPER_ADMIN_EMAIL: "${SUPER_ADMIN_EMAIL:?set SUPER_ADMIN_EMAIL in .env.prod}"
      SUPER_ADMIN_PASSWORD: "${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env.prod}"
    networks: [default]

  api:
    image: ghcr.io/anomalyco/qcart/api:latest
    depends_on:
      redis:
        condition: service_started
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-qcart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qcart}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env.prod}"
      PORT: 3001
      CORS_ORIGIN: "https://${DOMAIN:-qcart.gmtmall.com}"
      REDIS_URL: "redis://redis:6379"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_STARTER: "${STRIPE_PRICE_STARTER:-}"
      STRIPE_PRICE_GROWTH: "${STRIPE_PRICE_GROWTH:-}"
      STRIPE_PRICE_ENTERPRISE: "${STRIPE_PRICE_ENTERPRISE:-}"
      FRONTEND_URL: "https://${DOMAIN:-qcart.gmtmall.com}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      OPENAI_REALTIME_MODEL: "${OPENAI_REALTIME_MODEL:-}"
      NOTIFICATIONS_URL: "${NOTIFICATIONS_URL:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      NODE_ENV: production
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
    ports: !reset []
    volumes:
      # Uploaded menu images/logos live on the API container's filesystem
      # (/app/uploads). Persist them across redeploys.
      - qcart_uploads:/app/uploads
    networks: [default]

  qcart-frontend:
    image: ghcr.io/anomalyco/qcart/frontend:latest
    # Caddy proxies this by name over `edge`. The service name doubles as the
    # edge DNS alias, so it MUST be unique across all stacks on the VPS — a
    # generic "frontend" alias collides with qarrito's upstream and 502s it.
    container_name: qcart-frontend
    restart: always
    ports: !reset []
    networks: [default, edge]

volumes:
  qcart_uploads:

networks:
  # Shared cross-stack network; Caddy (in qarrito's stack) joins it and proxies
  # qcart.gmtmall.com → qcart-frontend:80. Created once on the host:
  #   docker network create edge
  edge:
    external: true
