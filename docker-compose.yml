services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qcart
      POSTGRES_PASSWORD: qcart
      POSTGRES_DB: qcart
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcart -d qcart"]
      interval: 3s
      retries: 10

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://qcart:qcart@postgres:5432/qcart
    command: >
      sh -c "npx drizzle-kit push --config=drizzle.config.ts 2>&1 && node dist/db/seed.js"
    restart: no

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://qcart:qcart@postgres:5432/qcart
      JWT_SECRET: qcart-dev-secret-change-in-prod
      PORT: 3001
      CORS_ORIGIN: http://localhost:80
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "3001:3001"

  # Service name is intentionally unique (NOT "frontend"): on the shared `edge`
  # network in production this name becomes a DNS alias, and a generic name like
  # "frontend" collides with other stacks' upstreams (it took down qarrito once).
  qcart-frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
