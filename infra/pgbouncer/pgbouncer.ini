[databases]
qcart = host=postgres port=5432 dbname=qcart

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
default_pool_size = 25
max_client_conn = 100
max_db_connections = 50

server_idle_timeout = 600
query_timeout = 30
